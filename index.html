
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Ranking System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">

    <!-- ===== HEADER ===== -->
    <header class="header">
        <div class="header-content">
            <h1 class="title">♟️ Chess Ranking System</h1>

            <div>
                <span>Theme</span>
                <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme">
                    <span class="theme-icon">🌙</span>
                </button>
            </div>
        </div>
    </header>

    <main class="main">

        <!-- ===== ADD PLAYER ===== -->
        <section class="section">
            <h2 class="section-title">Add Player</h2>

            <form id="addPlayerForm">
                <div class="form-group">
                    <label for="playerName">Player Name:</label>
                    <br>
                    <br>
                    <input 
                        id="playerName" 
                        class="input" 
                        placeholder="Enter player name"
                        required
                    >
                </div><br>

                <button class="btn btn-primary" type="submit">
                    Add Player
                </button>
            </form>
        </section>

        <!-- ===== RANKINGS ===== -->
        <section class="section">

            <div class="rankings-header">
                <h2 class="section-title">Rankings</h2>
                <button id="refreshBtn" class="btn btn-secondary">
                    ↻ Refresh
                </button><br><br>
            </div>

            <div class="filters">
                <input 
                    id="searchInput" 
                    class="input search-input"
                    placeholder="Search players..."
                >
            </div>
            <br><br>

            <div class="table-wrapper">
                <table class="rankings-table">
                    <thead>
                        <tr>
                            <th>Rank</th>
                            <th>Name</th>
                            <th>Points</th>
                            <th>Byes</th>
                            <th>Games</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="rankingsTable"></tbody>
                </table>
            </div>

            <div id="emptyState" class="empty-state">
                No players added yet.
            </div>

        </section>

        <!-- ===== STATS ===== -->
        <section class="section">
            <h2 class="section-title">Statistics</h2>

            <p>
                Total Players: <strong id="totalPlayers">0</strong>
            </p>
        </section>

        <!-- ===== ACTIONS ===== -->
        <section class="section">

            <h2 class="section-title">Manage Data</h2>

            <div class="action-buttons">
                <button id="exportBtn" class="btn btn-warning">
                    📥 Export Data
                </button>

                <button id="clearBtn" class="btn btn-danger">
                    🗑️ Clear All
                </button>
            </div>

        </section>

    </main>
</div>

<!-- ===== EDIT MODAL ===== -->
<div id="editModal" class="modal" role="dialog" aria-modal="true">
    <div class="modal-content">

        <h3>Edit Player</h3>

        <form id="editPlayerForm">

            <div class="form-group">
                <label>Name</label>
                <input id="editPlayerName" class="input" required>
            </div>

            <div class="form-group">
                <label>Points</label>
                <input id="editPlayerPoints" type="number" step="0.5" class="input">
            </div>

            <div class="form-group">
                <label>Byes</label>
                <input id="editPlayerByes" type="number" class="input">
            </div>

            <div class="action-buttons">
                <button class="btn btn-primary">Save</button>
                <button type="button" id="modalCancel" class="btn btn-secondary">Cancel</button>
            </div>

        </form>
    </div>
</div>

<!-- ===== TOAST ===== -->
<div id="toast" class="toast"></div>

<script src="script.js"></script>

</body>
</html>
